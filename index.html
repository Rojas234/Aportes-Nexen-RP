<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | Gestión</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --input-bg: #252525;
            --text: #ffffff;
            --danger: #ff4757;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            background-color: #000;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid var(--gta-orange);
            text-transform: uppercase;
        }

        .main-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Formulario */
        .upload-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-post {
            background: var(--gta-orange);
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Lista de Aportes */
        .aporte-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--gta-orange);
        }

        .aporte-info h3 { margin: 0; color: var(--gta-orange); }
        .aporte-info p { margin: 5px 0 0; color: #ccc; font-size: 0.9rem; }
