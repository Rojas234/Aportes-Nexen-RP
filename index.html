<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | Panel de Carga</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--gta-orange);
        }

        header h1 {
            margin: 0;
            color: var(--gta-orange);
            letter-spacing: 2px;
        }

        .main-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        /* Sección del Formulario */
        .upload-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .upload-section h2 {
            margin-top: 0;
            color: var(--gta-orange);
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-post {
            background: var(--gta-orange);
            color: black;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn-post:hover {
            background: #e67e22;
        }

        /* Lista de Aportes */
        .feed-section h2 {
            border-left: 4px solid var(--gta-orange);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .aporte-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .aporte-info h3 {
            margin: 0;
            color: var(--gta-orange);
        }

        .aporte-info p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: #bbb;
        }

        .btn-dl {
            background: #333;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .btn-dl:hover {
            background: #444;
        }
    </style>
</head>
<body>

<header>
    <h1>APORTES ROJAS</h1>
</header>

<div class="main-container">
    
    <section class="upload-section">
        <h2>Subir Nuevo Aporte</h2>
        <div class="form-group">
            <label>Título del Mod/Script</label>
            <input type="text" placeholder="Ej: Velocímetro Realista v2">
        </div>
        <div class="form-group">
            <label>Descripción corta</label>
            <textarea rows="2" placeholder="Explica brevemente qué hace tu aporte..."></textarea>
        </div>
        <div class="form-group">
            <label>Enlace de descarga (Mediafire/Mega/GitHub)</label>
            <input type="url" placeholder="https://...">
        </div>
        <button class="btn-post">Publicar Aporte</button>
    </section>

    <section class="feed-section">
        <h2>Últimas Publicaciones</h2>
        
        <div class="aporte-item">
            <div class="aporte-info">
                <h3>Pack de Skins LSPD</h3>
                <p>Nuevas texturas en HD para el departamento de policía.</p>
            </div>
            <a href="#" class="btn-dl">Descargar</a>
        </div>

        <div class="aporte-item">
            <div class="aporte-info">
                <h3>Filtrado de Chat CLEO</h3>
                <p>Oculta mensajes molestos del servidor automáticamente.</p>
            </div>
            <a href="#" class="btn-dl">Descargar</a>
        </div>

    </section>
</div>

</body>
</html>
